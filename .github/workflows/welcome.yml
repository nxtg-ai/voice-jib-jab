name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue! A maintainer will review it shortly.
            Please check our [contributing guidelines](CONTRIBUTING.md) in the meantime.
          pr-message: >
            Thanks for your first pull request! A maintainer will review it shortly.
            Please ensure CI passes and you've read our [contributing guidelines](CONTRIBUTING.md).
